<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dafa_Module_Client</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="canvas"></canvas> <!-- 1 -->
    <div id="opennav" onclick="showNavbar()">
        <img src="assets/show_navigation.svg">
    </div>

    <div id="createnode"><!-- 3 -->
        <form onsubmit="return false">
        <label for="create"><b>Create Node</b></label><br>
        <input id="create" type="text" min="1" max="10">
        <button type="button" onclick="createNode()">Create</button>
        </form> 
    </div>

    <div id="navbar"> <!-- 2 -->
        <div id="save">
            <img src="assets/download.svg">
            <p>Save Image</p>
        </div>
        <div id="find">
            <img src="assets/find_path.svg">
            <p>Find Path</p>
        </div>
        <div id="connect" class="disabled">
            <img src="assets/connect.svg">
            <p>Connect</p>
        </div>
        <div id="delete" class="disabled">
            <img src="assets/delete.svg">
            <p>Delete</p>
        </div>
        <div id="clear">
            <img src="assets/empty.svg">
            <p>Clear</p>
        </div>
    </div>

    <p id="connect-hint" style="display: none; color: red; position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%); font-weight: bold; font-family: sans-serif; z-index: 1;">
    Choose Target Node</p>

    <div id="distance"><!-- 5 -->
        <form onsubmit="return false">
        <label for="create"><b>Distance</b></label><br>
        <input id="create" type="number" min="1" max="100">
        <button type="button">Connect</button>
        </form> 
    </div>

      
<script src="main.js"></script>   
</body>
</html>
